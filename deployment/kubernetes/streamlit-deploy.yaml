apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  labels:
    app: streamlit
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamlit
  strategy: {}
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers:
        - name: streamlit
          image: docker.io/catchnaren/streamlit:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          resources: {}
status: {}
